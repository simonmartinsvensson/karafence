<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>KaraFence</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0b12;
        overflow: hidden;
        /* Kill native mobile gestures: scroll, pinch-zoom, double-tap zoom. */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        /* Suppress the iOS/Android long-press callout + tap highlight. */
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        /* Fill the viewport edge-to-edge; dvh tracks the mobile URL bar. The
           padding insets the play area away from camera cut-outs and the Android
           gesture bar; the dark body background shows through the strips (it
           matches the in-game background, so they read as a clean frame rather
           than letterboxing). box-sizing keeps the padding inside the viewport. */
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        box-sizing: border-box;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      #game-inner {
        /* Phaser mounts here and measures THIS element (getBoundingClientRect),
           so the canvas sizes to the safe area, not the padded outer box. */
        position: relative;
        width: 100%;
        height: 100%;
      }
      #game canvas {
        display: block;
        touch-action: none;
      }
      /* Portrait nudge: this game plays best in landscape (lanes run wide). A
         non-blocking pill fades itself out and never intercepts taps. */
      #rotate-hint {
        position: fixed;
        top: calc(env(safe-area-inset-top) + 10px);
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        pointer-events: none;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(20, 20, 30, 0.82);
        border: 1px solid #e84393;
        color: #fff;
        font: 13px/1 monospace;
        white-space: nowrap;
        display: none;
      }
      @media (orientation: portrait) {
        #rotate-hint {
          display: block;
          animation: rotate-hint-fade 4.5s ease forwards;
        }
      }
      @keyframes rotate-hint-fade {
        0%,
        65% {
          opacity: 0.96;
        }
        100% {
          opacity: 0;
          visibility: hidden;
        }
      }
    </style>
  </head>
  <body>
    <div id="game"><div id="game-inner"></div></div>
    <div id="rotate-hint">↻ Rotate your phone for the best view</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
